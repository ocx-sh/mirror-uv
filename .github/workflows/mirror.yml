name: uv

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - mirror.yml
      - scripts/**
      - tests/**
      - metadata*.json
      - .github/workflows/mirror.yml

concurrency:
  group: mirror-${{ github.workflow }}-publish
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.plan.outputs.has_new }}
      versions: ${{ steps.plan.outputs.versions }}
      target: ${{ steps.plan.outputs.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ocx-sh/setup-ocx@v1
      - id: plan
        name: Plan versions
        # `GITHUB_TOKEN` is forwarded to the in-process octocrab client so
        # release-listing runs authenticated (5 000 reqs/h) instead of the
        # 60/h unauthenticated quota that bites on multi-version runs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ocx run -- ocx-mirror pipeline plan --format json > plan.json
          echo "has_new=$(jq -r '.has_new' plan.json)" >> "${GITHUB_OUTPUT}"
          echo "versions=$(jq -c '.versions' plan.json)" >> "${GITHUB_OUTPUT}"
          echo "target=$(jq -r '.target' plan.json)" >> "${GITHUB_OUTPUT}"

  prepare:
    needs: discover
    if: needs.discover.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ocx-sh/setup-ocx@v1
      - name: Prepare ${{ matrix.version.version }}
        # `GITHUB_TOKEN` is forwarded to the in-process octocrab client so
        # release-listing runs authenticated (5 000 reqs/h). With N parallel
        # prepare legs each calling the source unauthenticated, the 60/h
        # anonymous quota blows up after the first run of the day.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ocx run -- ocx-mirror pipeline prepare --version "${{ matrix.version.version }}"
          # Flatten .ocx-mirror/{V}/{P}/bundle.tar.xz → bundles/bundle-{V}-{P_slug}.tar.xz
          # and copy the per-platform metadata.json written by `pipeline prepare`
          # as sibling so `ocx package test` auto-discovers the correct override
          # (e.g. metadata-darwin.json baked content) via its bundle→metadata
          # sibling convention. Do NOT copy the spec-level metadata.json from CWD
          # — that always contains the default path, not the platform override.
          V="${{ matrix.version.version }}"
          mkdir -p bundles
          shopt -s nullglob
          for platform_dir in ".ocx-mirror/${V}"/*/; do
            [ -d "${platform_dir}" ] || continue
            P_SLUG=$(basename "${platform_dir}")
            cp "${platform_dir}bundle.tar.xz" "bundles/bundle-${V}-${P_SLUG}.tar.xz"
            cp "${platform_dir}metadata.json" "bundles/bundle-${V}-${P_SLUG}-metadata.json"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bundle-${{ matrix.version.version }}
          path: bundles/
          retention-days: 1

  test:
    needs: [discover, prepare]
    if: needs.discover.outputs.has_new == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux_amd64
            runner: ubuntu-latest
            container_id: _native_
            shell: bash
            tests:
              - name: smoke
                kind: script
                script: tests/smoke.star
          - platform: linux/arm64
            platform_slug: linux_arm64
            runner: ubuntu-24.04-arm
            container_id: _native_
            shell: bash
            tests:
              - name: smoke
                kind: script
                script: tests/smoke.star

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ocx-sh/setup-ocx@v1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: bundle-*
          path: bundles/
          merge-multiple: true
      # Resolve this matrix leg's html_url up front via `gh api` so the JUnit
      # emit step can embed it as a `ci.job.url` testsuite property. GitHub
      # Actions has no default env var carrying the per-leg URL (only the
      # workflow run URL), so one API call per matrix leg is unavoidable.
      - name: Run tests for all versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # `tr -d '\r'` strips CR injected by native jq.exe on Windows runners.
          # Git Bash word-splits `$()` on LF only, so without this the captured
          # value carries a trailing CR and corrupts downstream paths/URLs.
          CI_JOB_URL=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq ".jobs[] | select(.name | contains(\"${{ matrix.platform_slug }}\") and contains(\"${{ matrix.container_id }}\")) | .html_url" \
            | head -n1 | tr -d '\r' || true)
          export CI_JOB_URL
          VERSIONS='${{ needs.discover.outputs.versions }}'
          for VERSION in $(echo "${VERSIONS}" | jq -r '.[].version' | tr -d '\r'); do
            BUNDLE="bundles/bundle-${VERSION}-${{ matrix.platform_slug }}.tar.xz"
            METADATA_SIBLING="${BUNDLE%.tar.xz}-metadata.json"
            mkdir -p junit
            JUNIT_FILE="junit/junit-${VERSION}-${{ matrix.platform_slug }}-${{ matrix.container_id }}.xml"
            TESTS_JSON='${{ toJson(matrix.tests) }}'
            TEST_COUNT=$(echo "${TESTS_JSON}" | jq 'length')
            FAILURES=0
            CASES=""
            for i in $(seq 0 $((TEST_COUNT - 1))); do
              TEST_NAME=$(echo "${TESTS_JSON}" | jq -r ".[$i].name")
              TEST_KIND=$(echo "${TESTS_JSON}" | jq -r ".[$i].kind")
              START=$(date +%s)
              RC=0
              if [ "${TEST_KIND}" = "command" ]; then
                TEST_CMD=$(echo "${TESTS_JSON}" | jq -r ".[$i].command")
                ocx run -- ocx package test --platform "${{ matrix.platform }}" --identifier "ocx.sh/uv:${VERSION}" "${BUNDLE}" -- \
                  ${{ matrix.shell }} -c "${TEST_CMD}" || RC=$?
              elif [ "${TEST_KIND}" = "script" ]; then
                TEST_SCRIPT=$(echo "${TESTS_JSON}" | jq -r ".[$i].script")
                ocx run -- ocx package test --platform "${{ matrix.platform }}" --identifier "ocx.sh/uv:${VERSION}" "${BUNDLE}" \
                  --script "${TEST_SCRIPT}" || RC=$?
              else
                TEST_INLINE=$(echo "${TESTS_JSON}" | jq -r ".[$i].script_inline")
                printf '%s' "${TEST_INLINE}" | ocx run -- ocx package test --platform "${{ matrix.platform }}" --identifier "ocx.sh/uv:${VERSION}" "${BUNDLE}" \
                  --script - || RC=$?
              fi
              END=$(date +%s)
              DUR=$((END - START))
              if [ "${RC}" -eq 0 ]; then
                CASES="${CASES}    <testcase name=\"${TEST_NAME}\" classname=\"${VERSION}.${{ matrix.platform_slug }}.${{ matrix.container_id }}\" time=\"${DUR}\"/>\n"
              else
                CASES="${CASES}    <testcase name=\"${TEST_NAME}\" classname=\"${VERSION}.${{ matrix.platform_slug }}.${{ matrix.container_id }}\" time=\"${DUR}\"><failure type=\"NonZeroExit\" message=\"exit ${RC}\"/></testcase>\n"
                FAILURES=$((FAILURES + 1))
              fi
            done
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo "<testsuites>"
              echo "  <testsuite name=\"${VERSION}.${{ matrix.platform_slug }}.${{ matrix.container_id }}\" tests=\"${TEST_COUNT}\" failures=\"${FAILURES}\">"
              if [ -n "${CI_JOB_URL:-}" ]; then
                echo "    <properties>"
                echo "      <property name=\"ci.job.url\" value=\"${CI_JOB_URL}\"/>"
                echo "    </properties>"
              fi
              printf '%b' "${CASES}"
              echo "  </testsuite>"
              echo "</testsuites>"
            } > "${JUNIT_FILE}"
            echo "wrote ${JUNIT_FILE} (tests=${TEST_COUNT}, failures=${FAILURES})"
            if [ "${FAILURES}" -gt 0 ]; then
              exit 1
            fi

          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: junit-${{ matrix.platform_slug }}-${{ matrix.container_id }}
          path: junit/
          retention-days: 1

  push:
    needs: [discover, prepare, test]
    # `if: always()` keeps push running even when the `test` job is marked
    # failed (any matrix leg red). The push step gates per-(V, P) on JUnit
    # results: greens publish, reds are skipped. Without `always()` a single
    # failed test leg short-circuits the whole job and prevents partial
    # publication + notification.
    if: always() && needs.discover.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    outputs:
      any_new_green: ${{ steps.summarise.outputs.any_new_green }}
      any_red: ${{ steps.summarise.outputs.any_red }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ocx-sh/setup-ocx@v1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: bundle-*
          path: .artifacts/bundles/
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: junit-*
          path: .artifacts/junit/
          merge-multiple: true
      # Detect whether registry credentials are configured.
      # GitHub does not allow `secrets.*` in job-level `if:`, so we probe at
      # step level via env-var injection (secret value never echoed to logs).
      - name: Detect registry credentials
        id: creds
        env:
          OCX_MIRROR_REGISTRY_TOKEN: ${{ secrets.OCX_MIRROR_REGISTRY_TOKEN }}
        run: |
          if [ -n "${OCX_MIRROR_REGISTRY_TOKEN}" ]; then
            echo "have=true" >> "${GITHUB_OUTPUT}"
          else
            echo "have=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::No OCX_MIRROR_REGISTRY_TOKEN secret — registry push skipped (repo runs in test/validation mode)."
          fi
      # Use docker login so ocx picks credentials up via its
      # native-credential fallback (`get_docker_auth` in crates/ocx_lib/src/auth.rs).
      # Env-var auth (`OCX_AUTH_<REG>_USER/_TOKEN`) takes precedence over the
      # docker fallback inside ocx, so do NOT also export those vars here.
      - name: Login to ocx.sh
        if: ${{ steps.creds.outputs.have == 'true' }}
        run: |
          echo "${{ secrets.OCX_MIRROR_REGISTRY_TOKEN }}" \
            | docker login ocx.sh \
                -u "${{ secrets.OCX_MIRROR_REGISTRY_USER }}" \
                --password-stdin
      - name: Push
        if: ${{ steps.creds.outputs.have == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Resolve this push job's html_url so the Discord embed can link
          # green rows + push-tier failures back to push logs. GHA has no
          # default env var for the per-job URL.
          OCX_MIRROR_JOB_URL=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq '.jobs[] | select(.name == "push") | .html_url' \
            | head -n1 || true)
          export OCX_MIRROR_JOB_URL
          # Use eval-of-`ocx env --shell=sh` instead of `ocx run --`.
          # Reason: `ocx run` (host stable from setup-ocx) calls
          # apply_ocx_config(self_exe=<host>), which sets OCX_BINARY_PIN
          # to the host binary in the child env. ocx-mirror then spawns
          # `ocx package push --format json` via PIN — the host (older)
          # ocx is invoked and may emit a different stdout shape, so the
          # JSON parse fails. The eval form composes the project-tier
          # env into this shell without propagating PIN, so ocx-mirror's
          # PATH-resolution finds the dev cli first. (Discover, prepare,
          # test, notify don't trigger PIN-driven re-spawns, so they keep
          # using `ocx run --`.)
          eval "$(ocx env --shell=sh)"
          unset OCX_BINARY_PIN
          ocx-mirror pipeline push \
            --bundles-dir .artifacts/bundles \
            --junit-dir .artifacts/junit \
            --write-summary run-summary.json
      # Fallback: when no credentials are present the push step above is skipped,
      # so run-summary.json is never written. Emit safe defaults so the `notify`
      # job's `if:` evaluates cleanly to false (skip, not error).
      - id: summarise-no-creds
        if: ${{ steps.creds.outputs.have != 'true' }}
        name: Export summary outputs (no credentials — push skipped)
        run: |
          echo "any_new_green=false" >> "${GITHUB_OUTPUT}"
          echo "any_red=false" >> "${GITHUB_OUTPUT}"
      # `if: always()` keeps the job outputs flowing to `notify` even when the
      # push step exits non-zero (full-red run). Without it, a failed push job
      # leaves the outputs empty and the notify gate evaluates to false.
      - id: summarise
        if: always()
        name: Export summary outputs
        run: |
          if [ -f run-summary.json ]; then
            echo "any_new_green=$(jq -r '.any_new_green' run-summary.json)" >> "${GITHUB_OUTPUT}"
            echo "any_red=$(jq -r '.any_red' run-summary.json)" >> "${GITHUB_OUTPUT}"
          fi
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: run-summary
          path: run-summary.json
          retention-days: 1
          if-no-files-found: ignore
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2.23.0
        with:
          files: .artifacts/junit/**/*.xml

  notify:
    needs: [discover, push]
    if: >-
      always() &&
      needs.discover.outputs.has_new == 'true' &&
      (needs.push.outputs.any_new_green == 'true' || needs.push.outputs.any_red == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ocx-sh/setup-ocx@v1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: run-summary
      - name: Notify
        run: |
          ocx run -- ocx-mirror pipeline notify --run-summary run-summary.json
        env:
          OCX_MIRROR_DISCORD_HOOK: ${{ secrets.OCX_MIRROR_DISCORD_HOOK }}
