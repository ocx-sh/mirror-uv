name: uv
target:
  registry: ocx.sh
  repository: uv

source:
  type: github_release
  owner: astral-sh
  repo: uv
  tag_pattern: "^(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "uv-x86_64-unknown-linux-musl\\.tar\\.gz$"
  linux/arm64:
    - "uv-aarch64-unknown-linux-musl\\.tar\\.gz$"
  darwin/amd64:
    - "uv-x86_64-apple-darwin\\.tar\\.gz$"
  darwin/arm64:
    - "uv-aarch64-apple-darwin\\.tar\\.gz$"
  windows/amd64:
    - "uv-x86_64-pc-windows-msvc\\.zip$"
  windows/arm64:
    - "uv-aarch64-pc-windows-msvc\\.zip$"

asset_type:
  type: archive
  strip_components:
    default: 1
    platforms:
      # uv-*-pc-windows-msvc.zip ships uv.exe + uvx.exe flat at root.
      windows/amd64: 0
      windows/arm64: 0

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "0.10.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    runner: macos-latest
    prefix: ["arch", "-x86_64"]
  darwin/arm64:
    runner: macos-latest
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh
  windows/arm64:
    runner: windows-11-arm
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
